name: Build GlintColorizer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '4.9'

      - run: cd GlintColorizer && gradle setupDecompWorkspace
        timeout-minutes: 30

      - run: cd GlintColorizer && gradle build
        timeout-minutes: 15

      - uses: actions/upload-artifact@v4
        with:
          name: GlintColorizer-1.0.0
          path: GlintColorizer/build/libs/GlintColorizer-1.0.0.jar
